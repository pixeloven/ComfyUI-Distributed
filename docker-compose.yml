services:
  comfy-master-react:
    image: ghcr.io/pixeloven/comfyui-docker/core:cuda-latest
    user: ${PUID:-1000}:${PGID:-1000}
    container_name: comfy-master-react
    network_mode: host
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - COMFY_PORT=8188
      - CLI_ARGS=--enable-cors-header
      - CUDA_VISIBLE_DEVICES=0
      - COMFY_UI_TYPE=react  # Environment variable to switch UI
    volumes:
      - comfyui_data:/data
      # Mount models and other ComfyUI directories
      - ./data/comfy/models:/data/comfy/models
      - ./data/comfy/output:/data/comfy/output
      - ./data/comfy/user/default/workflows:/data/comfy/user/default/workflows

      # Mount project into custom_nodes directory
      - ./:/data/comfy/custom_nodes/ComfyUI-Distributed
    runtime: nvidia

  comfy-master-legacy:
    image: ghcr.io/pixeloven/comfyui-docker/core:cuda-latest
    user: ${PUID:-1000}:${PGID:-1000}
    container_name: comfy-master-legacy
    network_mode: host
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - COMFY_PORT=8189  # Different port for legacy UI
      - CLI_ARGS=--enable-cors-header
      - CUDA_VISIBLE_DEVICES=0
      - COMFY_UI_TYPE=legacy  # Environment variable to switch UI
    volumes:
      - comfyui_data:/data
      # Mount models and other ComfyUI directories
      - ./data/comfy/models:/data/comfy/models
      - ./data/comfy/output:/data/comfy/output
      - ./data/comfy/user/default/workflows:/data/comfy/user/default/workflows

      # Mount project into custom_nodes directory
      - ./:/data/comfy/custom_nodes/ComfyUI-Distributed
    runtime: nvidia

volumes: 
  comfyui_data:
